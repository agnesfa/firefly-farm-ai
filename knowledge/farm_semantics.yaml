# Firefly Corner Farm — Semantic Layer (Layer 3)
#
# Canonical definitions of farm metrics and business rules.
# This is WHAT THINGS MEAN — governed, reviewable, versioned.
#
# The code in mcp-server/semantics.py reads this file and computes metrics.
# When field reality contradicts a definition, update THIS file —
# the code automatically uses the new values.
#
# Human-reviewable: Agnes and Claire should be able to read every
# definition and confirm "yes, that's what we mean by X."
#
# Last updated: 2026-04-12
# Maintainer: Agnes (semantic changes require review + rationale in git commit)
#
# Governing principle: FIELD DATA IS GOLD (see farm_ontology.yaml)
# Every metric here should answer: "Is the gold being mined, verified,
# preserved, and connected effectively?"

---

# ═══════════════════════════════════════════════════════
# SECTION HEALTH METRICS
# ═══════════════════════════════════════════════════════

section_health:

  strata_coverage:
    definition: >
      Fraction of expected strata layers with at least 1 living plant.
      Measures whether the syntropic design intent (multi-layer canopy)
      is being achieved.
    calculation: "count(distinct strata where plant_count > 0) / expected_strata"
    expected_strata:
      tree_section: 4     # emergent, high, medium, low
      open_section: 2     # medium, low
    thresholds:
      good: 0.75          # 3/4 strata (tree) or 2/2 (open)
      fair: 0.50          # 2/4 strata (tree) or 1/2 (open)
      poor: 0.25          # missing most layers
    notes: >
      Young sections (< 6 months) may legitimately have low coverage.
      Consider section age when interpreting.

  survival_rate:
    definition: >
      Living plants as a fraction of total ever planted in a section.
      Indicates whether the section is establishing successfully.
    calculation: "current_inventory / total_ever_planted"
    thresholds:
      healthy: 0.70
      concerning: 0.50
      at_risk: 0.30
    caveats:
      - name: pioneer_exception
        description: >
          Pioneer species (pigeon pea, wattles, tagasaste) ARE EXPECTED
          to die. Low pioneer survival is design intent, not failure.
          A section with 30% pioneer survival but thriving secondary
          species is HEALTHY.
        applies_to: "Species where succession_stage = pioneer"

  activity_recency:
    definition: >
      Days since the last observation or activity log for a section.
      Indicates whether the section is being actively managed.
    calculation: "today - max(log.timestamp for logs in section)"
    thresholds:
      active: 14            # days — section recently visited
      needs_attention: 30   # days — getting stale
      neglected: 60         # days — has been forgotten
    notes: >
      Dormant sections (e.g., winter fallow) may legitimately have
      long gaps. Consider season when interpreting.

  succession_balance:
    definition: >
      Ratio of pioneer:secondary:climax species in a section.
      Indicates whether the syntropic succession is progressing
      as designed — pioneers giving way to secondary and climax.
    calculation: "count by succession_stage / total plants"
    interpretation_by_age:
      young:        # < 1 year
        description: "Should be pioneer-heavy"
        expected_pioneer: "> 50%"
      maturing:     # 1-3 years
        description: "Transitioning — pioneers declining, secondary rising"
        expected_pioneer: "30-50%"
        expected_secondary: "30-50%"
      established:  # 3+ years
        description: "Climax becoming dominant"
        expected_climax: "> 30%"
    notes: >
      Section age is calculated from first_planted date.
      Pioneer die-off is a SUCCESS signal, not a failure.

# ═══════════════════════════════════════════════════════
# PLANT-LEVEL METRICS
# ═══════════════════════════════════════════════════════

plant_metrics:

  transplant_readiness:
    definition: >
      Whether a nursery plant has grown long enough to survive
      transplanting to the field.
    calculation: "(today - planted_date) >= species.transplant_days"
    source_field: "transplant_days from plant_types.csv / farmOS taxonomy"
    notes: >
      transplant_days varies by species (e.g., 60 for tomato, 180 for macadamia).
      Missing transplant_days = cannot assess readiness (flag as LOW confidence).

  species_distribution:
    definition: >
      Count of distinct sections where a species has at least 1 living plant.
      Indicates concentration risk and diversification.
    calculation: "count(distinct sections where species.count > 0)"
    notes: >
      High distribution = resilient. Low distribution = single point of failure.

# ═══════════════════════════════════════════════════════
# KNOWLEDGE METRICS
# ═══════════════════════════════════════════════════════

knowledge_metrics:

  kb_coverage:
    definition: >
      Whether Knowledge Base entries exist for species present in the field
      and for each active farm domain topic.
    gaps:
      species_gap: "Species with plants in field but no KB entry"
      topic_gap: "Active farm domain (from topics vocabulary) with no KB entries"
    assessment: "count(covered) / count(total)"

  workflow_reproducibility:
    definition: >
      Whether SOPs or tutorials exist for common field tasks, enabling
      a new WWOOFer to perform the task without oral instruction.
    core_workflows:
      - watering
      - pruning
      - transplanting
      - harvesting
      - composting
      - seed_saving
      - mulching
    assessment: "Per workflow: does a KB entry with category=sop|tutorial exist?"

# ═══════════════════════════════════════════════════════
# DECISION PIPELINE METRICS (Layer 4 Integration)
# ═══════════════════════════════════════════════════════

decision_pipeline:

  task_completion_rate:
    definition: >
      Fraction of created tasks that have been completed within a period.
      Indicates whether the plan→execute pipeline is functioning.
    calculation: "count(done tasks) / count(all tasks) per period"
    thresholds:
      healthy: 0.80
      concerning: 0.60
      stalled: 0.40

  observation_to_action_ratio:
    definition: >
      Fraction of observations that led to a follow-up task or knowledge entry.
      High = responsive system. Low = observations filed but not acted on.
    calculation: "count(observations with subsequent task/KB) / count(observations)"
    notes: >
      Not every observation needs a follow-up action. Pure inventory counts
      are expected to have no action. Condition reports SHOULD have follow-up.

  decision_trace_completeness:
    definition: >
      Fraction of tasks that have rationale recorded — not just "what"
      but "why" and "because of what observation."
    calculation: "count(tasks with rationale) / count(tasks)"
    notes: >
      This is the metric that detects whether the Context Graph (Layer 4)
      is actually being populated. If completeness is low, institutional
      memory is not accumulating.

# ═══════════════════════════════════════════════════════
# INTERACTION INTELLIGENCE (Learning Layer)
# ═══════════════════════════════════════════════════════

interaction_metrics:

  correction_rate:
    definition: >
      How often a human corrects the AI's interpretation in a session.
      High rate = semantic layer gap (definitions unclear or wrong).
    signal: "Human says 'no', 'that's not right', 'actually...'"

  question_recurrence:
    definition: >
      Same question asked across multiple sessions.
      High recurrence = answer not persisted or not satisfying.
    signal: "Same entity + similar phrasing across sessions"

  proactive_value:
    definition: >
      Whether proactively surfaced information led to action.
      Measures whether push intelligence (alerts, suggestions)
      is useful or noise.
    signal: "farm_context gap detection → task created"

# ═══════════════════════════════════════════════════════
# DATA QUALITY METRICS (Field Data is Gold)
# ═══════════════════════════════════════════════════════
#
# Every signal from the field is gold. These metrics measure
# whether the system is mining, verifying, preserving, and
# connecting that gold effectively.
#
# Reference: farm_ontology.yaml "GOVERNING PRINCIPLE — FIELD DATA IS GOLD"
#
# INTERACTION RIPPLE MAP
# ─────────────────────
# Every field interaction should ripple through the system,
# touching entities and moving metrics. The test of a healthy
# system: trace a single QR observation and count the entities
# it enriches.
#
# Example: WWOOFer submits QR observation for Pigeon Pea in P2R3.15-21
#   → Observation entity created (who, when, what, where)
#   → Plant entity updated (inventory count changed → survival_rate moves)
#   → Section entity touched (activity_recency resets to 0 days)
#   → Species entity enriched (distribution map updated, reference photo if verified)
#   → Media entity created (photo with provenance + verification status)
#   → Actor entity updated (this WWOOFer's contribution tracked)
#   → Row entity (section health aggregates → strata_coverage may change)
#   → Knowledge gaps detected (does a KB entry exist for this species?)
#   → Decision pipeline (does this observation warrant a follow-up task?)
#   → Session memory (team activity velocity metric ticks)
#   → Growth model (data quality metrics move: pipeline_age, import_rate)
#
# If any of those entities is NOT touched, there is a gap in the system.
# The metrics below measure whether the gold is flowing through.

data_quality:

  species_photo_coverage:
    definition: >
      Fraction of active species in the field that have a verified
      reference photo (either from farm observation or PlantNet stock).
      Directly impacts WWOOFer species identification ability.
    calculation: "count(species with verified reference photo) / count(distinct active species)"
    interpretation:
      direction: higher_is_better
      thresholds:
        equipped: 0.50     # half of species visually identifiable
        growing: 0.25
        minimal: 0.10
        dormant: 0.0
    photo_tier_breakdown:
      tier_1: "Farm observation photos (verified via PlantNet)"
      tier_2: "PlantNet stock reference photos (fallback)"
    notes: >
      Tier 1 always preferred over Tier 2. A species with only Tier 2
      still counts as covered but should be flagged for upgrade.

  observation_pipeline_age:
    definition: >
      Maximum age in days of observations sitting in pending status.
      Measures whether field data is flowing through to farmOS promptly.
      Gold left unmined loses context.
    calculation: "max(today - observation.timestamp) for status=pending"
    interpretation:
      direction: lower_is_better
      thresholds:
        healthy: 3        # imported within 3 days
        fair: 7           # within a week
        concerning: 14    # two weeks is too long
        stale: 30         # context is degrading
    notes: >
      An observation older than 14 days may have counts that no longer
      reflect field reality. Flag for review before importing.

  observation_import_rate:
    definition: >
      Fraction of submitted observations that import cleanly into farmOS
      without manual intervention, duplicate detection, or rejection.
    calculation: "count(imported) / count(submitted) per period"
    interpretation:
      direction: higher_is_better
      thresholds:
        clean: 0.85
        fair: 0.70
        noisy: 0.50
    breakdowns:
      duplicates_caught: "Observations that matched existing farmOS assets"
      species_unmapped: "Species name submitted didn't match taxonomy"
      rejected: "Rejected with reason (unknown species, empty data)"
    notes: >
      Low import rate signals either poor QR page UX (species picker
      confusing) or taxonomy gaps (species not in system).

  provenance_coverage:
    definition: >
      Fraction of farmOS entities (plants, observations, photos) that
      carry traceable source attribution — who, when, how, from what input.
    calculation: "count(entities with source_type + captured_by + timestamp) / count(all entities)"
    interpretation:
      direction: higher_is_better
      thresholds:
        governed: 0.90
        structured: 0.70
        partial: 0.50
    notes: >
      Data without provenance is untrusted. Legacy data from before
      provenance tracking may have gaps — these should be flagged
      and backfilled where possible, not silently accepted.

  source_conflict_rate:
    definition: >
      Count of unresolved conflicts where two data sources disagree
      about the same entity (e.g., transcript says Okra=11, QR says 6).
      Conflicts MUST be surfaced, never silently resolved.
    calculation: "count(entities with conflicting source values)"
    interpretation:
      direction: lower_is_better
      thresholds:
        clean: 0
        acceptable: 3
        concerning: 10
    notes: >
      Each conflict should be tracked as a pending review task with
      both values and the trust ranking of each source.

  entity_touch_rate:
    definition: >
      Average number of entities enriched per field interaction.
      A healthy system turns one observation into 5-10 entity updates.
      A leaky system creates the observation log and stops there.
    calculation: >
      For each import_observations call: count distinct entities
      touched (plant updated, section activity reset, species photo
      refreshed, actor attributed, KB gap flagged, task created).
      Average over the last 30 days.
    interpretation:
      direction: higher_is_better
      thresholds:
        rich: 5.0         # each observation enriches 5+ entities
        adequate: 3.0     # basic entity chain working
        shallow: 1.5      # only creating the log, not rippling
    notes: >
      This is the master metric for the Field Data is Gold principle.
      If entity_touch_rate is low, gold is being captured but not
      connected to the intelligence layer.

  lifecycle_completeness:
    definition: >
      Fraction of entity lifecycles that have reached their expected
      state transitions. Measures whether data flows through the
      full pipeline, not just the first step.
    lifecycle_chains:
      observation: "captured → reviewed → approved → imported → farmOS log + entity updates → pages regenerated"
      plant: "observed → created → located → inventoried → photo attached → visible on QR page"
      seed: "acquired → seed bank → sown → germinated → transplanted → field plant"
      knowledge: "learned → captured → categorised → cross-referenced → searchable"
      task: "identified → created → assigned → in_progress → completed → outcome recorded"
    calculation: >
      For each lifecycle chain: count entities that completed all
      steps / count entities that entered the chain.
    interpretation:
      direction: higher_is_better
      thresholds:
        complete: 0.80     # most entities reach full lifecycle
        partial: 0.50      # entities stalling mid-pipeline
        broken: 0.30       # systemic pipeline gaps
    notes: >
      Partial lifecycles indicate pipeline gaps. A plant that was
      created but never got a location log is a broken lifecycle.
      An observation that was imported but never triggered entity
      updates is a shallow import.

  external_reference_coverage:
    definition: >
      Fraction of species with botanical names that have validated
      PlantNet bridge mappings in plantnet_bridge.csv.
      Measures ability to verify photos against external AI.
    calculation: "count(species in bridge) / count(species with botanical_name)"
    interpretation:
      direction: higher_is_better
      thresholds:
        complete: 0.95    # nearly all species bridged
        usable: 0.80
        gaps: 0.50
    notes: >
      Unmapped species will fail PlantNet verification even when the
      photo is correct. Priority: map species that have plants in
      the field first, then nursery, then seed bank.

# ═══════════════════════════════════════════════════════
# FEEDBACK LOOPS
# ═══════════════════════════════════════════════════════

feedback_loops:

  - signal: "Survival rate consistently violates threshold for pioneer species"
    action: "Review ontology: is strata/succession classification correct for this climate?"
    feeds_back_to: farm_ontology.yaml

  - signal: "Transplant readiness predictions fail (transplanted too early/late)"
    action: "Review semantic definition: is transplant_days accurate for subtropical conditions?"
    feeds_back_to: farm_semantics.yaml (plant_metrics.transplant_readiness)

  - signal: "Tasks go unactioned despite observations"
    action: "Review decision pipeline: is the task workflow working? Are the right people seeing tasks?"
    feeds_back_to: farm_semantics.yaml (decision_pipeline)

  - signal: "Different Claude sessions give different health assessments"
    action: "Review semantic definitions: are thresholds clear? Are there ambiguous edge cases?"
    feeds_back_to: farm_semantics.yaml (section_health)

  - signal: "Knowledge gaps persist despite team effort"
    action: "Review ontology: is the topic vocabulary complete? Are new farm domains emerging?"
    feeds_back_to: farm_ontology.yaml (topics vocabulary)

  - signal: "High correction rate in human-AI interactions"
    action: "Specific definition is wrong or unclear. Find which metric was corrected and update."
    feeds_back_to: farm_semantics.yaml (the specific metric)

  - signal: "Same question recurs across sessions"
    action: "Answer needs to be persisted (KB entry) or definition needs to be canonical (semantic layer)"
    feeds_back_to: "Knowledge Base or farm_semantics.yaml"

  # Data quality feedback loops (Field Data is Gold)
  - signal: "Species reference photos fail PlantNet verification at high rate"
    action: "Review photo capture UX — are workers taking section-level shots instead of close-ups? Add guidance."
    feeds_back_to: "QR observe page UX + Knowledge Base (photo tutorial)"

  - signal: "Observations sit pending for >7 days"
    action: "Review pipeline — is the review/approve/import workflow blocked? Who is responsible?"
    feeds_back_to: "farm_semantics.yaml (observation_pipeline_age) + Team workflow"

  - signal: "Species names submitted via QR don't match taxonomy"
    action: "Review species picker UX — is search working? Are common names missing from taxonomy?"
    feeds_back_to: "plant_types.csv + QR page species search"

  - signal: "Data sources conflict (transcript vs QR vs farmOS)"
    action: "Surface both values with trust ranking. Create pending review task. Never silently pick one."
    feeds_back_to: "farm_context data integrity gate"

  - signal: "New data captured but not connected to semantic context"
    action: "Trace the data flow — where did it stop? Is there a missing join key, unmapped entity, or broken pipeline step?"
    feeds_back_to: "farm_ontology.yaml (join_keys) + MCP tool implementation"
